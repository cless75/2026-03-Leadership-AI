<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <rect width="800" height="400" fill="#F8FFF2"/>
  <text x="400" y="40" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="24" font-weight="bold" fill="#0C2340">Экзоскелет vs Коляска</text>
  <!-- Exoskeleton -->
  <rect x="60" y="80" width="260" height="130" rx="12" fill="#3DCBC0" stroke="#0C2340" stroke-width="2"/>
  <text x="190" y="120" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="20" font-weight="bold" fill="#0C2340">Экзоскелет</text>
  <text x="190" y="150" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="14" fill="#0C2340">AI усиливает, вы учитесь</text>
  <text x="190" y="175" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="16" font-weight="bold" fill="#0C2340">Навык растёт ↑</text>
  <!-- Wheelchair -->
  <rect x="480" y="80" width="260" height="130" rx="12" fill="#F8FFF2" stroke="#F7AF22" stroke-width="4"/>
  <text x="610" y="120" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="20" font-weight="bold" fill="#0C2340">Коляска</text>
  <text x="610" y="150" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="14" fill="#0C2340">AI делает за вас</text>
  <text x="610" y="175" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="16" font-weight="bold" fill="#0C2340">Навык деградирует ↓</text>
  <!-- Bidirectional arrow -->
  <line x1="320" y1="145" x2="480" y2="145" stroke="#0C2340" stroke-width="2" marker-end="url(#ar)" marker-start="url(#arl)"/>
  <text x="400" y="135" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">один и тот же AI</text>
  <!-- Marker diamond -->
  <polygon points="400,310 460,270 400,230 340,270" fill="#F8FFF2" stroke="#F7AF22" stroke-width="3"/>
  <text x="400" y="265" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="13" font-weight="bold" fill="#0C2340">Маркер</text>
  <text x="400" y="282" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">Учусь ли я?</text>
  <line x1="340" y1="270" x2="190" y2="210" stroke="#0C2340" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="460" y1="270" x2="610" y2="210" stroke="#0C2340" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Footer -->
  <text x="400" y="370" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="14" font-style="italic" fill="#0C2340">Для рутины коляска ОК. Для навыковых задач — только экзоскелет.</text>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0C2340"/></marker>
    <marker id="arl" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 10 0 L 0 5 L 10 10 z" fill="#0C2340"/></marker>
  </defs>
</svg>
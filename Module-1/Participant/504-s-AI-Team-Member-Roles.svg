<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <rect width="700" height="500" fill="#F8FFF2"/>
  <text x="350" y="40" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="24" font-weight="bold" fill="#0C2340">AI — член команды</text>
  <!-- Center ellipse -->
  <ellipse cx="350" cy="200" rx="100" ry="60" fill="#F7AF22" stroke="#0C2340" stroke-width="2"/>
  <text x="350" y="195" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="18" font-weight="bold" fill="#0C2340">AI-агент</text>
  <text x="350" y="215" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">член команды</text>
  <!-- Analyst -->
  <rect x="40" y="160" width="160" height="80" rx="10" fill="#3DCBC0" stroke="#0C2340" stroke-width="2"/>
  <text x="120" y="195" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="16" font-weight="bold" fill="#0C2340">Аналитик</text>
  <text x="120" y="215" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">Видит паттерны</text>
  <line x1="200" y1="200" x2="250" y2="200" stroke="#0C2340" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Mentor -->
  <rect x="500" y="160" width="160" height="80" rx="10" fill="#3DCBC0" stroke="#0C2340" stroke-width="2"/>
  <text x="580" y="195" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="16" font-weight="bold" fill="#0C2340">Наставник</text>
  <text x="580" y="215" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">Тренирует навык</text>
  <line x1="450" y1="200" x2="500" y2="200" stroke="#0C2340" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Coach -->
  <rect x="270" y="340" width="160" height="80" rx="10" fill="#3DCBC0" stroke="#0C2340" stroke-width="2"/>
  <text x="350" y="375" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="16" font-weight="bold" fill="#0C2340">Коуч</text>
  <text x="350" y="395" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="12" fill="#0C2340">Системная рефлексия</text>
  <line x1="350" y1="260" x2="350" y2="340" stroke="#0C2340" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Footer -->
  <text x="350" y="470" text-anchor="middle" font-family="IBM Plex Sans,sans-serif" font-size="14" font-style="italic" fill="#0C2340">Лидер выбирает роль AI для задачи</text>
  <defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0C2340"/></marker></defs>
</svg>